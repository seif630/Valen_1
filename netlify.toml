# Monorepo: site source is in angels/
[build]
  base = "angels"
  command = "npm run build:netlify"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/api/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
