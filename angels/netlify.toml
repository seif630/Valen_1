# Next.js on Netlify (app lives in this folder)
# publish must differ from the base directory — plugin requires .next output

[build]
  command = "npm run build:netlify"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/api/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
